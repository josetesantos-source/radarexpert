<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Radar Expert — Curadoria semanal para consultoras financeiras</title>
  <meta name="description" content="Curadoria estratégica semanal para consultoras financeiras que atendem micro e pequenas empresas.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="_ds/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/tokens/colors.css">
  <link rel="stylesheet" href="_ds/tokens/typography.css">
  <link rel="stylesheet" href="_ds/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/tokens/effects.css">

  <style>
    /* ── KEYFRAMES ─────────────────────────────────────── */
    @keyframes radarSpin { to { transform: rotate(360deg); } }
    @keyframes blip1 { 0%,100% { opacity:.18; } 50% { opacity:1; } }
    @keyframes blip2 { 0%,100% { opacity:.12; } 60% { opacity:.85; } }
    @keyframes shimmer { from { background-position:-200% center; } to { background-position:200% center; } }
    @keyframes dotPulse { 0%,100% { box-shadow:0 0 0 0 rgba(238,184,17,.7); } 60% { box-shadow:0 0 0 7px rgba(238,184,17,0); } }
    @keyframes sidebarIn { from { opacity:0; transform:translateX(-16px); } to { opacity:1; transform:none; } }

    /* ── REVEAL ────────────────────────────────────────── */
    .js-reveal { opacity:0; transform:translateY(30px); transition:opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1); }
    .js-reveal.is-visible { opacity:1; transform:none; }
    .js-stagger > * { opacity:0; transform:translateY(14px); transition:opacity .5s cubic-bezier(.16,1,.3,1), transform .5s cubic-bezier(.16,1,.3,1); }
    .js-stagger.is-visible > *:nth-child(1) { opacity:1; transform:none; }
    .js-stagger.is-visible > *:nth-child(2) { opacity:1; transform:none; transition-delay:.07s; }
    .js-stagger.is-visible > *:nth-child(3) { opacity:1; transform:none; transition-delay:.14s; }
    .js-stagger.is-visible > *:nth-child(4) { opacity:1; transform:none; transition-delay:.21s; }

    /* ── RESET ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing:border-box; }
    body { margin:0; background:var(--surface-page); font-family:var(--font-sans); color:var(--text-body); -webkit-font-smoothing:antialiased; }
    p, h1, h2, h3, h4, blockquote { margin:0; }
    h1, h2, h3, h4 { font-weight:400; }
    a { color:var(--text-gold); text-underline-offset:3px; transition:color .18s ease; }
    a:hover { color:var(--dourado-deep); }
    strong { color:var(--text-strong); font-weight:600; }
    button { font-family:var(--font-sans); cursor:pointer; border:none; background:none; }

    /* ── READING PROGRESS BAR ──────────────────────────── */
    #progress-bar { position:fixed; top:0; left:0; right:0; height:3px; background:var(--border-subtle); z-index:200; }
    #progress-fill {
      height:100%; width:0%;
      background:linear-gradient(90deg, var(--dourado-700), var(--dourado-400), var(--dourado-200));
      background-size:200% 100%;
      animation:shimmer 2.5s linear infinite;
      transition:width .12s linear;
    }

    /* ── LAYOUT SHELL ──────────────────────────────────── */
    .app { display:flex; min-height:100vh; }

    /* ── SIDEBAR ───────────────────────────────────────── */
    .sidebar {
      width:288px; flex:none;
      position:sticky; top:0; height:100vh; overflow-y:auto;
      background:var(--surface-inverse);
      border-right:1px solid rgba(238,184,17,.12);
      display:flex; flex-direction:column;
      padding:32px 0 40px;
      scrollbar-width:thin; scrollbar-color:rgba(238,184,17,.2) transparent;
    }
    .sidebar::-webkit-scrollbar { width:4px; }
    .sidebar::-webkit-scrollbar-thumb { background:rgba(238,184,17,.2); border-radius:4px; }

    .sb-logo { padding:0 24px 28px; border-bottom:1px solid rgba(255,255,255,.07); }
    .sb-logo-row { display:flex; align-items:center; gap:14px; }
    .sb-radar-svg { width:38px; height:38px; flex:none; }
    .sb-wordmark { font-family:var(--font-display); font-size:24px; letter-spacing:.14em; color:var(--text-on-dark); line-height:1; }
    .sb-wordmark-sub { font-size:9px; font-weight:700; letter-spacing:.32em; text-transform:uppercase; color:var(--accent-on-dark); margin-top:3px; }

    /* search */
    .sb-search { padding:20px 20px 0; }
    .sb-search-wrap { position:relative; }
    .sb-search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--text-on-dark-muted); pointer-events:none; }
    .sb-search-input {
      width:100%; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1);
      border-radius:8px; padding:9px 12px 9px 34px;
      font-family:var(--font-sans); font-size:13px; color:var(--text-on-dark);
      outline:none; transition:border-color .18s ease, background .18s ease;
    }
    .sb-search-input::placeholder { color:var(--text-on-dark-muted); }
    .sb-search-input:focus { border-color:rgba(238,184,17,.4); background:rgba(255,255,255,.10); }

    /* archive */
    .sb-label { font-size:10px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--text-on-dark-muted); padding:24px 24px 10px; }
    .sb-list { list-style:none; margin:0; padding:0 12px; flex:1; }
    .sb-item { margin-bottom:2px; }
    .sb-item-btn {
      display:block; width:100%; text-align:left;
      padding:11px 12px; border-radius:8px;
      color:var(--text-on-dark-muted); font-size:13px; line-height:1.4;
      transition:background .18s ease, color .18s ease;
    }
    .sb-item-btn:hover { background:rgba(255,255,255,.07); color:var(--text-on-dark); }
    .sb-item-btn.is-active { background:rgba(238,184,17,.14); color:var(--dourado-400); }
    .sb-item-num { font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--dourado-700); display:block; margin-bottom:3px; }
    .sb-item-btn.is-active .sb-item-num { color:var(--dourado-400); }
    .sb-item-title { display:block; font-size:12px; color:inherit; margin-bottom:3px; }
    .sb-item-week { display:block; font-size:11px; color:var(--text-on-dark-muted); opacity:.7; }
    .sb-item-btn.is-active .sb-item-week { opacity:.9; }

    /* no results */
    .sb-no-results { padding:12px 24px; font-size:13px; color:var(--text-on-dark-muted); display:none; }

    /* mobile toggle */
    .sidebar-toggle {
      display:none; position:fixed; top:14px; left:14px; z-index:300;
      width:40px; height:40px; border-radius:10px;
      background:var(--surface-inverse); border:1px solid rgba(238,184,17,.2);
      align-items:center; justify-content:center;
      box-shadow:var(--shadow-md);
    }
    .sidebar-toggle svg { color:var(--dourado-400); }
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(28,28,28,.55); z-index:150; }

    /* ── MAIN CONTENT ──────────────────────────────────── */
    .main { flex:1; min-width:0; }

    /* loading state */
    .content-loading {
      display:flex; align-items:center; justify-content:center;
      min-height:60vh; color:var(--text-muted); font-size:14px; gap:10px;
    }
    .loading-spinner { width:20px; height:20px; border:2px solid var(--border-subtle); border-top-color:var(--dourado-500); border-radius:50%; animation:radarSpin .8s linear infinite; }

    /* ── NEWSLETTER STYLES (inside .nl) ────────────────── */
    #nl-progress { position:fixed; top:0; left:0; right:0; height:3px; background:var(--border-subtle); z-index:1000; }
    #nl-progress-fill { height:100%; width:0%; background:linear-gradient(90deg, var(--dourado-700), var(--dourado-400), var(--dourado-200)); background-size:200% 100%; animation:shimmer 2.5s linear infinite; transition:width .12s linear; }

    #nl-signal-nav { position:fixed; right:28px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; align-items:center; gap:10px; z-index:100; opacity:0; pointer-events:none; transition:opacity .4s ease; }
    #nl-signal-nav.is-shown { opacity:1; pointer-events:auto; }
    .sn-dot { width:8px; height:8px; border-radius:50%; background:var(--border-strong); cursor:pointer; transition:background .22s ease, transform .22s ease; }
    .sn-dot:hover { background:var(--dourado-500); transform:scale(1.3); }
    .sn-dot.is-active { background:var(--dourado-500); transform:scale(1.4); animation:dotPulse 1.6s ease-in-out; }
    .sn-label { font-size:9px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--text-muted); margin-top:6px; white-space:nowrap; }
    @media(max-width:860px){ #nl-signal-nav { display:none; } }

    .nl { max-width:640px; margin:0 auto; padding:3px 40px 100px; }
    @media(max-width:700px){ .nl { padding:3px 24px 72px; } }
    @media(max-width:500px){ .nl { padding:3px 18px 72px; } }

    .nl-header { padding:58px 0 40px; border-bottom:1px solid var(--border-subtle); }
    .nl-logo-row { display:flex; align-items:center; gap:18px; margin-bottom:30px; }
    .nl-radar-svg { width:52px; height:52px; flex:none; }
    .nl-wordmark-main { font-family:var(--font-display); font-size:34px; letter-spacing:.14em; color:var(--text-strong); line-height:1; }
    .nl-wordmark-sub { font-size:10px; font-weight:700; letter-spacing:.32em; text-transform:uppercase; color:var(--text-gold); margin-top:4px; }
    .nl-meta { font-size:11px; font-weight:600; letter-spacing:.20em; text-transform:uppercase; color:var(--text-muted); margin-bottom:18px; }
    .nl-meta-dot { color:var(--dourado-400); margin:0 8px; }
    .nl-hero-title { font-family:var(--font-display); font-size:clamp(28px,5vw,44px); color:var(--text-strong); line-height:1.13; max-width:500px; letter-spacing:-.01em; }

    .nl-selecao { padding:28px 0 22px; display:flex; align-items:center; gap:0; }
    .nl-selecao-text { font-size:10px; font-weight:700; letter-spacing:.26em; text-transform:uppercase; color:var(--text-gold); flex:none; padding-right:18px; white-space:nowrap; }
    .nl-selecao-rule { flex:1; height:1px; background:var(--border-subtle); transform:scaleX(0); transform-origin:left; transition:transform .9s .25s cubic-bezier(.16,1,.3,1); }
    .is-visible .nl-selecao-rule { transform:scaleX(1); }
    @media(max-width:500px){ .nl-selecao-text { font-size:9px; letter-spacing:.18em; } }

    .nl-intro { font-size:17px; line-height:1.74; color:var(--text-body); }

    .nl-section-div { display:flex; align-items:center; gap:14px; margin:56px 0 30px; }
    .nl-section-div-label { font-size:11px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--text-gold); flex:none; }
    .nl-section-div-rule { flex:1; height:1px; background:var(--border-subtle); transform:scaleX(0); transform-origin:left; transition:transform .7s .2s cubic-bezier(.16,1,.3,1); }
    .is-visible .nl-section-div-rule { transform:scaleX(1); }

    .nl-signal { background:var(--surface-raised); border:1px solid var(--border-strong); border-radius:14px; overflow:hidden; margin-bottom:26px; box-shadow:var(--shadow-md); transition:transform .32s cubic-bezier(.16,1,.3,1), box-shadow .32s cubic-bezier(.16,1,.3,1); }
    .nl-signal:hover { transform:translateY(-6px); box-shadow:var(--shadow-lg); }
    .nl-signal-hd { padding:28px 30px 24px; border-bottom:1px solid var(--border-subtle); position:relative; overflow:hidden; }
    .nl-signal-bg-num { position:absolute; right:-6px; top:-14px; font-family:var(--font-display); font-size:130px; color:var(--border-subtle); line-height:1; pointer-events:none; user-select:none; letter-spacing:-.04em; }
    .nl-signal-num { font-size:10px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--text-gold); margin-bottom:10px; }
    .nl-signal-title { font-family:var(--font-display); font-size:clamp(20px,3.6vw,27px); color:var(--text-strong); line-height:1.22; position:relative; }

    .nl-stat-row { display:flex; border-bottom:1px solid var(--border-subtle); }
    .nl-stat { flex:1; padding:20px 22px; border-right:1px solid var(--border-subtle); }
    .nl-stat:last-child { border-right:none; }
    .nl-stat-num { font-family:var(--font-display); font-size:clamp(22px,4vw,32px); color:var(--text-gold); line-height:1; margin-bottom:6px; display:block; }
    .nl-stat-label { font-size:10px; font-weight:600; letter-spacing:.10em; text-transform:uppercase; color:var(--text-muted); line-height:1.35; display:block; }
    .nl-stat-row--dark { background:var(--surface-inverse); }
    .nl-stat-row--dark .nl-stat { border-right-color:rgba(255,255,255,.07); }
    .nl-stat-row--dark .nl-stat-num { color:var(--dourado-400); }
    .nl-stat-row--dark .nl-stat-label { color:var(--text-on-dark-muted); }

    .nl-compare-row { display:flex; border-bottom:1px solid var(--border-subtle); background:var(--surface-sunken); }
    .nl-compare-item { flex:1; padding:18px 22px; border-right:1px solid var(--border-subtle); }
    .nl-compare-item:last-child { border-right:none; }
    .nl-compare-label { font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--text-muted); margin-bottom:9px; }
    .nl-compare-old { font-size:13px; color:var(--text-muted); text-decoration:line-through; margin-bottom:5px; }
    .nl-compare-arrow { font-size:11px; color:var(--dourado-500); display:block; margin-bottom:3px; }
    .nl-compare-new { font-family:var(--font-display); font-size:20px; color:var(--text-gold); line-height:1; }
    @media(max-width:500px){ .nl-compare-row { flex-direction:column; } .nl-compare-item { border-right:none; border-bottom:1px solid var(--border-subtle); } .nl-compare-item:last-child { border-bottom:none; } }

    .nl-partners-row { display:flex; align-items:center; gap:8px; padding:16px 22px; border-bottom:1px solid var(--border-subtle); flex-wrap:wrap; }
    .nl-partner-pill { font-size:12px; font-weight:600; color:var(--text-strong); background:var(--surface-page); border:1px solid var(--border-strong); border-radius:100px; padding:5px 14px; }
    .nl-free-badge { font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--success); background:var(--success-bg); border-radius:100px; padding:5px 13px; margin-left:auto; }

    .nl-signal-bd { padding:0 30px 30px; }
    .nl-sec { padding-top:22px; }
    .nl-sec + .nl-sec { margin-top:18px; padding-top:20px; border-top:1px solid var(--border-subtle); }
    .nl-sec-label { font-size:10px; font-weight:700; letter-spacing:.20em; text-transform:uppercase; color:var(--text-gold); margin-bottom:9px; }
    .nl-sec-text { font-size:15px; line-height:1.74; color:var(--text-body); }
    @media(max-width:500px){ .nl-signal-hd { padding:22px 20px 18px; } .nl-signal-bd { padding:0 20px 26px; } .nl-signal-bg-num { font-size:90px; } }

    .nl-importa-box { background:var(--surface-sunken); border-left:3px solid var(--dourado-500); border-radius:0 8px 8px 0; padding:14px 18px; font-size:15px; line-height:1.72; color:var(--text-body); }
    .nl-quote { background:var(--surface-inverse); border-radius:10px; padding:22px 24px; position:relative; overflow:hidden; }
    .nl-quote-mark { position:absolute; top:-8px; left:16px; font-family:var(--font-display); font-size:96px; color:rgba(238,184,17,.13); line-height:1; pointer-events:none; user-select:none; }
    .nl-quote-hint { font-size:10px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--dourado-400); margin-bottom:10px; position:relative; }
    .nl-quote-text { font-size:15px; font-style:italic; line-height:1.72; color:var(--text-on-dark); position:relative; }

    .nl-sugestao { background:var(--dourado-100); border:1px solid rgba(160,112,0,.18); border-radius:10px; padding:18px 20px; }
    .nl-sugestao-format { display:inline-flex; font-size:10px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--dourado-deep); background:rgba(160,112,0,.13); border-radius:100px; padding:4px 12px; margin-bottom:12px; }
    .nl-sugestao-gancho-label { font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--dourado-700); margin-bottom:7px; }
    .nl-sugestao-gancho { font-size:14px; line-height:1.66; color:var(--text-strong); font-style:italic; }

    .nl-source-link { font-size:12px; color:var(--text-muted); }
    .nl-source-link a { font-size:12px; color:var(--text-muted); }
    .nl-source-link a:hover { color:var(--text-gold); }

    .nl-cta { background:var(--surface-inverse); border-radius:16px; padding:52px 40px; text-align:center; position:relative; overflow:hidden; margin-top:60px; }
    .nl-cta-rings { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; opacity:.06; }
    .nl-cta-eyebrow { font-size:11px; font-weight:700; letter-spacing:.24em; text-transform:uppercase; color:var(--dourado-400); margin-bottom:14px; position:relative; }
    .nl-cta-title { font-family:var(--font-display); font-size:clamp(26px,5vw,38px); color:var(--text-on-dark); line-height:1.16; margin-bottom:34px; position:relative; }
    .nl-cta-btn { display:inline-block; background:var(--dourado-400); color:#2A2A2A; font-family:var(--font-sans); font-size:14px; font-weight:600; letter-spacing:.06em; text-decoration:none; padding:14px 38px; border-radius:8px; cursor:pointer; position:relative; transition:background .2s ease, transform .18s ease, box-shadow .2s ease; }
    .nl-cta-btn:hover { background:var(--dourado-500); color:#2A2A2A; transform:translateY(-2px); box-shadow:var(--shadow-gold); text-decoration:none; }
    .nl-cta-btn:active { transform:scale(.97); box-shadow:none; }
    @media(max-width:500px){ .nl-cta { padding:36px 24px; } }

    .nl-footer { margin-top:68px; padding-top:36px; border-top:1px solid var(--border-subtle); text-align:center; }
    .nl-footer-wordmark { font-family:var(--font-display); font-size:22px; letter-spacing:.14em; color:var(--text-strong); }
    .nl-footer-sub { font-size:10px; font-weight:700; letter-spacing:.32em; text-transform:uppercase; color:var(--text-gold); margin-top:4px; }
    .nl-footer-text { font-size:12px; color:var(--text-muted); margin-top:16px; line-height:1.72; }
    .nl-footer-rule { width:32px; height:1px; background:var(--dourado-500); margin:22px auto 0; opacity:.44; }

    /* ── MOBILE ────────────────────────────────────────── */
    @media(max-width:768px) {
      .sidebar {
        position:fixed; left:0; top:0; bottom:0; z-index:160;
        transform:translateX(-100%); transition:transform .3s cubic-bezier(.16,1,.3,1);
        box-shadow:var(--shadow-xl);
      }
      .sidebar.is-open { transform:none; }
      .sidebar-toggle { display:flex; }
      .sidebar-overlay.is-shown { display:block; }
      .main { padding-top:60px; }
    }
  </style>
</head>
<body>

<div id="progress-bar"><div id="progress-fill"></div></div>

<!-- Mobile sidebar toggle -->
<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Abrir arquivo">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <rect x="2" y="4" width="14" height="1.5" rx=".75" fill="currentColor"/>
    <rect x="2" y="8.25" width="14" height="1.5" rx=".75" fill="currentColor"/>
    <rect x="2" y="12.5" width="14" height="1.5" rx=".75" fill="currentColor"/>
  </svg>
</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-row">
        <svg class="sb-radar-svg" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="26" cy="26" r="25" stroke="#3A3A3A" stroke-width=".75"/>
          <circle cx="26" cy="26" r="17" stroke="#3A3A3A" stroke-width=".75"/>
          <circle cx="26" cy="26" r="9"  stroke="#3A3A3A" stroke-width=".75"/>
          <g style="transform-origin:26px 26px; animation:radarSpin 4.5s linear infinite;">
            <line x1="26" y1="26" x2="26" y2="1" stroke="#A07000" stroke-width="1.6" stroke-linecap="round" opacity=".85"/>
            <path d="M26 26 L26 1 A25 25 0 0 1 37.8 5.5 Z" fill="#EEB811" opacity=".22"/>
          </g>
          <circle cx="36" cy="12" r="2.5" fill="#EEB811" style="animation:blip1 2.4s ease-in-out infinite;"/>
          <circle cx="13" cy="34" r="1.8" fill="#A07000" style="animation:blip2 3.4s ease-in-out infinite;"/>
          <circle cx="26" cy="26" r="2.2" fill="#A07000"/>
        </svg>
        <div>
          <div class="sb-wordmark">RADAR</div>
          <div class="sb-wordmark-sub">Expert</div>
        </div>
      </div>
    </div>

    <div class="sb-search">
      <div class="sb-search-wrap">
        <svg class="sb-search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/>
          <line x1="9.5" y1="9.5" x2="12.5" y2="12.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <input type="search" class="sb-search-input" id="search-input" placeholder="Buscar edições…" autocomplete="off">
      </div>
    </div>

    <div class="sb-label">Arquivo</div>
    <ul class="sb-list" id="archive-list" role="list"></ul>
    <p class="sb-no-results" id="no-results">Nenhuma edição encontrada.</p>
  </aside>

  <!-- ══ MAIN ══ -->
  <main class="main" id="main-content">
    <div class="content-loading" id="content-loading">
      <div class="loading-spinner"></div>
      Carregando edição…
    </div>
    <div id="nl-signal-nav" aria-label="Sinais desta edição"></div>
    <div class="nl" id="nl-content" style="display:none;"></div>
  </main>

</div>

<script>
(function() {
  let editions = [];
  let currentId = null;

  // ── Mobile sidebar ──────────────────────────────────────
  const sidebar   = document.getElementById('sidebar');
  const overlay   = document.getElementById('sidebar-overlay');
  const toggleBtn = document.getElementById('sidebar-toggle');

  toggleBtn.addEventListener('click', () => {
    sidebar.classList.toggle('is-open');
    overlay.classList.toggle('is-shown');
  });
  overlay.addEventListener('click', () => {
    sidebar.classList.remove('is-open');
    overlay.classList.remove('is-shown');
  });

  // ── Progress bar ────────────────────────────────────────
  const fill = document.getElementById('progress-fill');
  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docH = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
    fill.style.width = Math.min(100, (scrollTop / docH) * 100) + '%';
  }, { passive: true });

  // ── Load editions manifest ──────────────────────────────
  fetch('editions.json')
    .then(r => r.json())
    .then(data => {
      editions = data.sort((a, b) => new Date(b.data_iso) - new Date(a.data_iso));
      renderArchive(editions);
      // Load latest (first in sorted list)
      if (editions.length) loadEdition(editions[0]);
    })
    .catch(() => {
      document.getElementById('content-loading').innerHTML =
        '<span style="color:var(--danger)">Erro ao carregar edições.</span>';
    });

  // ── Render sidebar archive ──────────────────────────────
  function renderArchive(list) {
    const ul = document.getElementById('archive-list');
    const noResults = document.getElementById('no-results');
    ul.innerHTML = '';

    if (!list.length) {
      noResults.style.display = 'block';
      return;
    }
    noResults.style.display = 'none';

    list.forEach(ed => {
      const li = document.createElement('li');
      li.className = 'sb-item';
      const btn = document.createElement('button');
      btn.className = 'sb-item-btn' + (ed.id === currentId ? ' is-active' : '');
      btn.dataset.id = ed.id;
      btn.innerHTML = `
        <span class="sb-item-num">Edição ${ed.numero}</span>
        <span class="sb-item-title">${ed.titulo}</span>
        <span class="sb-item-week">Semana de ${ed.semana} · ${ed.ano}</span>
      `;
      btn.addEventListener('click', () => {
        loadEdition(ed);
        // Close on mobile
        sidebar.classList.remove('is-open');
        overlay.classList.remove('is-shown');
      });
      li.appendChild(btn);
      ul.appendChild(li);
    });
  }

  // ── Load edition content ────────────────────────────────
  function loadEdition(ed) {
    if (currentId === ed.id) return;
    currentId = ed.id;

    // Update active state
    document.querySelectorAll('.sb-item-btn').forEach(b => {
      b.classList.toggle('is-active', b.dataset.id === ed.id);
    });

    const nlContent = document.getElementById('nl-content');
    const loading   = document.getElementById('content-loading');
    const signalNav = document.getElementById('nl-signal-nav');

    nlContent.style.display = 'none';
    loading.style.display   = 'flex';
    signalNav.innerHTML     = '';
    signalNav.classList.remove('is-shown');

    window.scrollTo({ top: 0, behavior: 'smooth' });

    fetch(ed.arquivo)
      .then(r => r.text())
      .then(html => {
        nlContent.innerHTML = html;
        loading.style.display = 'none';
        nlContent.style.display = 'block';

        // Update page title
        document.title = `Edição ${ed.numero} — ${ed.titulo} · Radar Expert`;

        // Re-run animations
        initReveal(nlContent);
        initCounters(nlContent);
        initSignalNav(nlContent, signalNav);
      })
      .catch(() => {
        loading.innerHTML = '<span style="color:var(--danger)">Erro ao carregar esta edição.</span>';
      });
  }

  // ── Scroll reveal ───────────────────────────────────────
  function initReveal(root) {
    const els = root.querySelectorAll('.js-reveal, .js-stagger');
    if (!els.length) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('is-visible'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.06, rootMargin: '0px 0px -44px 0px' });
    els.forEach(el => obs.observe(el));
  }

  // ── Animated counters ───────────────────────────────────
  function initCounters(root) {
    const counters = root.querySelectorAll('[data-count]');
    if (!counters.length) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (!e.isIntersecting) return;
        const el = e.target;
        const target = parseFloat(el.dataset.count);
        const decs   = parseInt(el.dataset.decimals || '0');
        const prefix = el.dataset.prefix || '';
        const suffix = el.dataset.suffix || '';
        const dur = 1400;
        const t0  = performance.now();
        const ease = t => 1 - Math.pow(1 - t, 3);
        const run = now => {
          const p = Math.min(1, (now - t0) / dur);
          el.textContent = prefix + (target * ease(p)).toFixed(decs).replace('.', ',') + suffix;
          if (p < 1) requestAnimationFrame(run);
        };
        requestAnimationFrame(run);
        obs.unobserve(el);
      });
    }, { threshold: 0.5 });
    counters.forEach(el => obs.observe(el));
  }

  // ── Signal navigation dots ──────────────────────────────
  function initSignalNav(root, nav) {
    const signals = root.querySelectorAll('.nl-signal');
    if (!signals.length) return;

    nav.innerHTML = '';
    signals.forEach((sig, i) => {
      const dot = document.createElement('div');
      dot.className = 'sn-dot';
      dot.title = sig.querySelector('.nl-signal-title')?.textContent || '';
      dot.addEventListener('click', () => {
        window.scrollTo({ top: sig.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' });
      });
      nav.appendChild(dot);
    });

    const label = document.createElement('div');
    label.className = 'sn-label';
    label.innerHTML = 'SINAL <span id="sn-current">01</span>/' + String(signals.length).padStart(2,'0');
    nav.appendChild(label);

    const header = root.querySelector('.nl-header');
    if (header) {
      new IntersectionObserver(([e]) => nav.classList.toggle('is-shown', !e.isIntersecting), { threshold: 0 }).observe(header);
    }

    const dots = nav.querySelectorAll('.sn-dot');
    const currentLabel = nav.querySelector('#sn-current');
    new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const idx = Array.from(signals).indexOf(e.target);
          dots.forEach((d, i) => d.classList.toggle('is-active', i === idx));
          if (currentLabel) currentLabel.textContent = String(idx + 1).padStart(2, '0');
        }
      });
    }, { threshold: 0.28, rootMargin: '-5% 0px -55% 0px' }).apply =
      (() => { signals.forEach(sig => new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            const idx = Array.from(signals).indexOf(e.target);
            dots.forEach((d, i) => d.classList.toggle('is-active', i === idx));
            if (currentLabel) currentLabel.textContent = String(idx + 1).padStart(2, '0');
          }
        });
      }, { threshold: 0.28, rootMargin: '-5% 0px -55% 0px' }).observe(sig)); })();
  }

  // ── Search ──────────────────────────────────────────────
  document.getElementById('search-input').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    if (!q) { renderArchive(editions); return; }
    const filtered = editions.filter(ed =>
      ed.titulo.toLowerCase().includes(q) ||
      ed.semana.toLowerCase().includes(q) ||
      (ed.sinais || []).some(s => s.toLowerCase().includes(q))
    );
    renderArchive(filtered);
  });

})();
</script>

</body>
</html>
