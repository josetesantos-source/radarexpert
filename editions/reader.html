<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RADAR EXPERT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../_ds/tokens/colors.css">
  <link rel="stylesheet" href="../_ds/tokens/typography.css">
  <link rel="stylesheet" href="../_ds/tokens/effects.css">

  <style>
    /* ── KEYFRAMES ─────────────────────────────────────────────── */
    @keyframes radarSpin { to { transform: rotate(360deg); } }
    @keyframes blip1     { 0%,100% { opacity:.18; } 50% { opacity:1; } }
    @keyframes blip2     { 0%,100% { opacity:.12; } 60% { opacity:.85; } }
    @keyframes shimmer   { from { background-position:-200% center; } to { background-position:200% center; } }
    @keyframes dotPulse  { 0%,100% { box-shadow:0 0 0 0 rgba(238,184,17,.7); } 60% { box-shadow:0 0 0 7px rgba(238,184,17,0); } }

    /* ── BASE ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--surface-page);
      font-family: var(--font-sans);
      color: var(--text-body);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    p, h1, h2, h3, h4, blockquote { margin: 0; }
    h1, h2, h3, h4 { font-weight: 400; }
    a { color: var(--text-gold); text-underline-offset: 3px; transition: color .18s ease; }
    a:hover { color: var(--dourado-deep); }
    strong { color: var(--text-strong); font-weight: 600; }

    /* ── PROGRESS BAR ──────────────────────────────────────────── */
    #nl-progress {
      position: fixed; top: 0; left: 0; right: 0;
      height: 3px; background: var(--border-subtle); z-index: 1000;
    }
    #nl-progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--dourado-700), var(--dourado-400), var(--dourado-200));
      background-size: 200% 100%;
      animation: shimmer 2.5s linear infinite;
      transition: width .12s linear;
    }

    /* ── READER NAV ────────────────────────────────────────────── */
    .reader-nav {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      height: 52px; padding: 0 28px;
      background: rgba(242, 239, 231, .92);
      backdrop-filter: blur(14px) saturate(120%);
      border-bottom: 1px solid var(--border-subtle);
    }
    .reader-back {
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      text-decoration: none; display: flex; align-items: center; gap: 8px;
      transition: color .18s ease;
    }
    .reader-back:hover { color: var(--text-strong); }
    .reader-back-arrow { font-size: 16px; line-height: 1; }
    .reader-edition-label {
      font-size: 11px; font-weight: 700; letter-spacing: .22em;
      text-transform: uppercase; color: var(--text-gold);
    }
    .reader-cta {
      padding: 7px 16px;
      background: var(--dourado-700); color: var(--creme-50);
      font-size: 12px; font-weight: 600; letter-spacing: .03em;
      border-radius: 6px; text-decoration: none;
      transition: background .18s ease;
    }
    .reader-cta:hover { background: var(--dourado-deep); }

    /* ── SIGNAL NAV (desktop) ──────────────────────────────────── */
    #nl-signal-nav {
      position: fixed; right: 28px; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity .4s ease;
    }
    #nl-signal-nav.is-shown { opacity: 1; pointer-events: auto; }
    .sn-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border-strong); cursor: pointer;
      transition: background .22s ease, transform .22s ease;
    }
    .sn-dot:hover { background: var(--dourado-500); transform: scale(1.3); }
    .sn-dot.is-active {
      background: var(--dourado-500); transform: scale(1.4);
      animation: dotPulse 1.6s ease-in-out;
    }
    .sn-label {
      font-size: 9px; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: var(--text-muted);
      margin-top: 6px; white-space: nowrap;
    }
    @media (max-width: 860px) { #nl-signal-nav { display: none; } }

    /* ── REVEAL SYSTEM ─────────────────────────────────────────── */
    .js-reveal {
      opacity: 0; transform: translateY(30px);
      transition: opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1);
    }
    .js-reveal.is-visible { opacity: 1; transform: none; }
    .js-stagger > * {
      opacity: 0; transform: translateY(14px);
      transition: opacity .5s cubic-bezier(.16,1,.3,1), transform .5s cubic-bezier(.16,1,.3,1);
    }
    .js-stagger.is-visible > *:nth-child(1) { opacity:1; transform:none; }
    .js-stagger.is-visible > *:nth-child(2) { opacity:1; transform:none; transition-delay:.07s; }
    .js-stagger.is-visible > *:nth-child(3) { opacity:1; transform:none; transition-delay:.14s; }
    .js-stagger.is-visible > *:nth-child(4) { opacity:1; transform:none; transition-delay:.21s; }

    /* ── LAYOUT ────────────────────────────────────────────────── */
    .nl { max-width: 640px; margin: 0 auto; padding: 3px 28px 100px; }
    @media (max-width: 500px) { .nl { padding: 3px 18px 72px; } }

    /* ── HEADER ────────────────────────────────────────────────── */
    .nl-header { padding: 58px 0 40px; border-bottom: 1px solid var(--border-subtle); }
    .nl-logo-row { display: flex; align-items: center; gap: 18px; margin-bottom: 30px; }
    .nl-radar-svg { width: 52px; height: 52px; flex: none; }
    .nl-wordmark-main { font-family: var(--font-display); font-size: 34px; letter-spacing: .14em; color: var(--text-strong); line-height: 1; }
    .nl-wordmark-sub  { font-size: 10px; font-weight: 700; letter-spacing: .32em; text-transform: uppercase; color: var(--text-gold); margin-top: 4px; }
    .nl-meta { font-size: 11px; font-weight: 600; letter-spacing: .20em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 18px; }
    .nl-meta-dot { color: var(--dourado-400); margin: 0 8px; }
    .nl-hero-title {
      font-family: var(--font-display);
      font-size: clamp(28px, 5vw, 44px);
      color: var(--text-strong); line-height: 1.13;
      max-width: 500px; letter-spacing: -.01em;
    }

    /* ── SELECAO PHRASE ────────────────────────────────────────── */
    .nl-selecao { padding: 28px 0 22px; display: flex; align-items: center; gap: 0; }
    .nl-selecao-text { font-size: 10px; font-weight: 700; letter-spacing: .26em; text-transform: uppercase; color: var(--text-gold); flex: none; padding-right: 18px; white-space: nowrap; }
    .nl-selecao-rule { flex: 1; height: 1px; background: var(--border-subtle); transform: scaleX(0); transform-origin: left; transition: transform .9s .25s cubic-bezier(.16,1,.3,1); }
    .is-visible .nl-selecao-rule { transform: scaleX(1); }
    @media (max-width: 500px) { .nl-selecao-text { font-size: 9px; letter-spacing: .18em; } }

    /* ── INTRO ─────────────────────────────────────────────────── */
    .nl-intro { font-size: 17px; line-height: 1.74; color: var(--text-body); }

    /* ── SECTION DIVIDER ───────────────────────────────────────── */
    .nl-section-div { display: flex; align-items: center; gap: 14px; margin: 56px 0 30px; }
    .nl-section-div-label { font-size: 11px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: var(--text-gold); flex: none; }
    .nl-section-div-rule { flex: 1; height: 1px; background: var(--border-subtle); transform: scaleX(0); transform-origin: left; transition: transform .7s .2s cubic-bezier(.16,1,.3,1); }
    .is-visible .nl-section-div-rule { transform: scaleX(1); }

    /* ── SIGNAL CARD ───────────────────────────────────────────── */
    .nl-signal {
      background: var(--surface-raised);
      border: 1px solid var(--border-strong);
      border-radius: 14px; overflow: hidden; margin-bottom: 26px;
      box-shadow: var(--shadow-md);
      transition: transform .32s cubic-bezier(.16,1,.3,1), box-shadow .32s cubic-bezier(.16,1,.3,1);
    }
    .nl-signal:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
    .nl-signal-hd {
      padding: 28px 30px 24px;
      border-bottom: 1px solid var(--border-subtle);
      position: relative; overflow: hidden;
    }
    .nl-signal-bg-num {
      position: absolute; right: -6px; top: -14px;
      font-family: var(--font-display); font-size: 130px; color: var(--border-subtle);
      line-height: 1; pointer-events: none; user-select: none; letter-spacing: -.04em;
    }
    .nl-signal-num { font-size: 10px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: var(--text-gold); margin-bottom: 10px; }
    .nl-signal-title { font-family: var(--font-display); font-size: clamp(20px,3.6vw,27px); color: var(--text-strong); line-height: 1.22; position: relative; }

    /* ── SIGNAL BODY ───────────────────────────────────────────── */
    .nl-signal-bd { padding: 0 30px 30px; }
    .nl-sec { padding-top: 22px; }
    .nl-sec + .nl-sec { margin-top: 18px; padding-top: 20px; border-top: 1px solid var(--border-subtle); }
    .nl-sec-label { font-size: 10px; font-weight: 700; letter-spacing: .20em; text-transform: uppercase; color: var(--text-gold); margin-bottom: 9px; }
    .nl-sec-text { font-size: 15px; line-height: 1.74; color: var(--text-body); }
    @media (max-width: 500px) {
      .nl-signal-hd { padding: 22px 20px 18px; }
      .nl-signal-bd { padding: 0 20px 26px; }
      .nl-signal-bg-num { font-size: 90px; }
    }

    /* ── IMPORTA BOX ───────────────────────────────────────────── */
    .nl-importa-box {
      background: var(--surface-sunken);
      border-left: 3px solid var(--dourado-500);
      border-radius: 0 8px 8px 0;
      padding: 14px 18px;
      font-size: 15px; line-height: 1.72; color: var(--text-body);
    }

    /* ── QUOTE (dark script card) ──────────────────────────────── */
    .nl-quote {
      background: var(--surface-inverse);
      border-radius: 10px; padding: 22px 24px;
      position: relative; overflow: hidden;
    }
    .nl-quote-mark {
      position: absolute; top: -8px; left: 16px;
      font-family: var(--font-display); font-size: 96px;
      color: rgba(238,184,17,.13); line-height: 1;
      pointer-events: none; user-select: none;
    }
    .nl-quote-hint { font-size: 10px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--dourado-400); margin-bottom: 10px; position: relative; }
    .nl-quote-text { font-size: 15px; font-style: italic; line-height: 1.72; color: var(--text-on-dark); position: relative; }

    /* ── SUGESTAO ──────────────────────────────────────────────── */
    .nl-sugestao { background: var(--dourado-100); border: 1px solid rgba(160,112,0,.18); border-radius: 10px; padding: 18px 20px; }
    .nl-sugestao-format { display: inline-flex; font-size: 10px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--dourado-deep); background: rgba(160,112,0,.13); border-radius: 100px; padding: 4px 12px; margin-bottom: 12px; }
    .nl-sugestao-gancho-label { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--dourado-700); margin-bottom: 7px; }
    .nl-sugestao-gancho { font-size: 14px; line-height: 1.66; color: var(--text-strong); font-style: italic; }

    /* ── SOURCE ────────────────────────────────────────────────── */
    .nl-source-link { font-size: 12px; color: var(--text-muted); }
    .nl-source-link a { font-size: 12px; color: var(--text-muted); }
    .nl-source-link a:hover { color: var(--text-gold); }

    /* ── STAT ROW ──────────────────────────────────────────────── */
    .nl-stat-row { display: flex; border-bottom: 1px solid var(--border-subtle); }
    .nl-stat { flex: 1; padding: 20px 22px; border-right: 1px solid var(--border-subtle); }
    .nl-stat:last-child { border-right: none; }
    .nl-stat-num { font-family: var(--font-display); font-size: clamp(22px,4vw,32px); color: var(--text-gold); line-height: 1; margin-bottom: 6px; display: block; }
    .nl-stat-label { font-size: 10px; font-weight: 600; letter-spacing: .10em; text-transform: uppercase; color: var(--text-muted); line-height: 1.35; display: block; }
    .nl-stat-row--dark { background: var(--surface-inverse); }
    .nl-stat-row--dark .nl-stat { border-right-color: rgba(255,255,255,.07); }
    .nl-stat-row--dark .nl-stat-num { color: var(--dourado-400); }
    .nl-stat-row--dark .nl-stat-label { color: var(--text-on-dark-muted); }

    /* ── CTA ───────────────────────────────────────────────────── */
    .nl-cta { background: var(--surface-inverse); border-radius: 16px; padding: 52px 40px; text-align: center; position: relative; overflow: hidden; margin-top: 60px; }
    .nl-cta-rings { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; opacity: .06; }
    .nl-cta-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .24em; text-transform: uppercase; color: var(--dourado-400); margin-bottom: 14px; position: relative; }
    .nl-cta-title { font-family: var(--font-display); font-size: clamp(26px,5vw,38px); color: var(--text-on-dark); line-height: 1.16; margin-bottom: 34px; position: relative; }
    .nl-cta-btn {
      display: inline-block;
      background: var(--dourado-400); color: #2A2A2A;
      font-family: var(--font-sans); font-size: 14px; font-weight: 600; letter-spacing: .06em;
      text-decoration: none; padding: 14px 38px; border-radius: 8px; cursor: pointer; position: relative;
      transition: background .2s ease, transform .18s ease, box-shadow .2s ease;
    }
    .nl-cta-btn:hover { background: var(--dourado-500); color: #2A2A2A; transform: translateY(-2px); box-shadow: var(--shadow-gold); text-decoration: none; }
    @media (max-width: 500px) { .nl-cta { padding: 36px 24px; } }

    /* ── FOOTER ────────────────────────────────────────────────── */
    .nl-footer { margin-top: 68px; padding-top: 36px; border-top: 1px solid var(--border-subtle); text-align: center; }
    .nl-footer-wordmark { font-family: var(--font-display); font-size: 22px; letter-spacing: .14em; color: var(--text-strong); }
    .nl-footer-sub { font-size: 10px; font-weight: 700; letter-spacing: .32em; text-transform: uppercase; color: var(--text-gold); margin-top: 4px; }
    .nl-footer-text { font-size: 12px; color: var(--text-muted); margin-top: 16px; line-height: 1.72; }
    .nl-footer-rule { width: 32px; height: 1px; background: var(--dourado-500); margin: 22px auto 0; opacity: .44; }

    /* ── LOADING STATE ─────────────────────────────────────────── */
    .nl-loading {
      text-align: center; padding: 80px 0;
      font-size: 13px; color: var(--text-muted); letter-spacing: .12em; text-transform: uppercase;
    }
  </style>
</head>
<body>

<!-- Progress bar -->
<div id="nl-progress"><div id="nl-progress-fill"></div></div>

<!-- Reader nav -->
<nav class="reader-nav">
  <a class="reader-back" href="/">
    <span class="reader-back-arrow">←</span>
    Radar Expert
  </a>
  <span class="reader-edition-label" id="reader-edition-label"></span>
  <a class="reader-cta" href="../assinar.html">Assinar</a>
</nav>

<!-- Signal navigation dots (desktop, populated by JS) -->
<nav id="nl-signal-nav" aria-label="Sinais desta edição"></nav>

<!-- Edition content -->
<div class="nl" id="nl-content">
  <div class="nl-loading">Carregando edição…</div>
</div>

<script>
(function () {
  'use strict';

  /* ── Get edition id from URL ── */
  const params  = new URLSearchParams(location.search);
  const id      = (params.get('id') || '03').replace(/[^0-9a-z]/gi, '');
  const numFmt  = '#' + id.replace(/^0+/, '') || '#' + id;

  /* ── Update page title with edition number ── */
  document.title = 'RADAR EXPERT — Edição ' + numFmt;
  const label = document.getElementById('reader-edition-label');
  if (label) label.textContent = 'Edição ' + numFmt;

  /* ── Fetch edition fragment ── */
  fetch(id + '.html')
    .then(function (r) {
      if (!r.ok) throw new Error('not found');
      return r.text();
    })
    .then(function (html) {
      document.getElementById('nl-content').innerHTML = html;
      initInteractions();
      /* Scroll to signal anchor if hash is present (e.g. #signal-2) */
      if (window.location.hash) {
        var target = document.querySelector(window.location.hash);
        if (target) {
          setTimeout(function () {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 120);
        }
      }
    })
    .catch(function () {
      document.getElementById('nl-content').innerHTML =
        '<div class="nl-loading">Edição não encontrada.</div>';
    });

  /* ── Init all interactions ── */
  function initInteractions () {

    /* 1. Progress bar */
    var fill = document.getElementById('nl-progress-fill');
    if (fill) {
      window.addEventListener('scroll', function () {
        var h = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
        fill.style.width = Math.min(100, (window.scrollY / h) * 100) + '%';
      }, { passive: true });
    }

    /* 2. Signal nav dots */
    var nav     = document.getElementById('nl-signal-nav');
    var header  = document.querySelector('.nl-header');
    var signals = document.querySelectorAll('.nl-signal');
    var total   = signals.length;

    if (nav && total) {
      /* Build dots */
      var dotsHtml = '';
      signals.forEach(function (s) {
        var idx   = s.dataset.signalIndex || '1';
        var title = s.querySelector('.nl-signal-title');
        var tip   = title ? title.textContent.trim().slice(0, 40) : 'Sinal ' + idx;
        dotsHtml += '<div class="sn-dot js-sn-dot" data-signal="' + idx + '" title="' + tip + '"></div>';
      });
      dotsHtml += '<div class="sn-label">SINAL <span id="sn-current">01</span>/' + String(total).padStart(2,'0') + '</div>';
      nav.innerHTML = dotsHtml;

      /* Show/hide nav based on header visibility */
      if (header) {
        var headerObs = new IntersectionObserver(function (entries) {
          nav.classList.toggle('is-shown', !entries[0].isIntersecting);
        }, { threshold: 0 });
        headerObs.observe(header);
      }

      /* Track active signal */
      var currentLabel = document.getElementById('sn-current');
      var sigTrackObs = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (!e.isIntersecting) return;
          var idx = e.target.dataset.signalIndex;
          document.querySelectorAll('.js-sn-dot').forEach(function (d) { d.classList.remove('is-active'); });
          var dot = document.querySelector('.js-sn-dot[data-signal="' + idx + '"]');
          if (dot) dot.classList.add('is-active');
          if (currentLabel) currentLabel.textContent = String(idx).padStart(2, '0');
        });
      }, { threshold: 0.28, rootMargin: '-5% 0px -55% 0px' });
      signals.forEach(function (s) { sigTrackObs.observe(s); });

      /* Dot click → scroll to signal */
      document.querySelectorAll('.js-sn-dot').forEach(function (dot) {
        dot.addEventListener('click', function () {
          var target = document.querySelector('.nl-signal[data-signal-index="' + dot.dataset.signal + '"]');
          if (target) {
            window.scrollTo({ top: target.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' });
          }
        });
      });
    }

    /* 3. Scroll reveal */
    var revealEls = document.querySelectorAll('.js-reveal, .js-stagger');
    if (revealEls.length) {
      var revealObs = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) {
            e.target.classList.add('is-visible');
            revealObs.unobserve(e.target);
          }
        });
      }, { threshold: 0.06, rootMargin: '0px 0px -44px 0px' });
      revealEls.forEach(function (el) { revealObs.observe(el); });
    }

    /* 4. Animated number counters */
    var counters = document.querySelectorAll('[data-count]');
    if (counters.length) {
      var counterObs = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (!e.isIntersecting) return;
          var el     = e.target;
          var target = parseFloat(el.dataset.count);
          var decs   = parseInt(el.dataset.decimals || '0');
          var prefix = el.dataset.prefix || '';
          var suffix = el.dataset.suffix || '';
          var dur    = 1400;
          var t0     = performance.now();
          var ease   = function(t) { return 1 - Math.pow(1 - t, 3); };
          (function run(now) {
            var p = Math.min(1, (now - t0) / dur);
            el.textContent = prefix + (target * ease(p)).toFixed(decs).replace('.', ',') + suffix;
            if (p < 1) requestAnimationFrame(run);
          })(performance.now());
          counterObs.unobserve(el);
        });
      }, { threshold: 0.7 });
      counters.forEach(function (el) { counterObs.observe(el); });
    }
  }

})();
</script>

</body>
</html>
